quarkus.oidc.tenant-enabled=true
quarkus.oidc.auth-server-url=http://keycloak:8080/realms/polaris-realm
quarkus.oidc.client-id=polaris-client
quarkus.oidc.token.issuer=any
quarkus.oidc.token.audience=any
quarkus.oidc.application-type=service
quarkus.http.auth.proactive=false
quarkus.log.category."io.quarkus.oidc".level=TRACE
quarkus.log.category."io.quarkus.oidc".min-level=TRACE
quarkus.log.category."org.jose4j".level=TRACE
quarkus.log.category."org.jose4j".min-level=TRACE
quarkus.log.category."io.quarkus.security".level=TRACE
quarkus.log.category."io.quarkus.security".min-level=TRACE

# --- Polaris Core Auth Config ---
polaris.authentication.type=mixed
polaris.oidc.principal-mapper.type=default
polaris.oidc.principal-mapper.name-claim-path=preferred_username

# --- Polaris OIDC Role Mapping (Optional / Future Use) ---
# Tells Quarkus to look for Keycloak groups in the "groups" claim
quarkus.oidc.roles.role-claim-path=groups

# Enables dynamic mapping of JWT groups to Polaris Principal Roles
polaris.oidc.principal-roles-mapper.type=default
polaris.oidc.principal-roles-mapper.filter=^(?!profile$|email$).*
polaris.oidc.principal-roles-mapper.mappings[0].regex=^.*$
polaris.oidc.principal-roles-mapper.mappings[0].replacement=PRINCIPAL_ROLE:$0
